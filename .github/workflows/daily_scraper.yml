name: Daily Sharesansar Indices Scrape

on:
  schedule:
    # 6:10 PM Asia/Kathmandu (UTC+5:45) is 12:25 PM UTC
    - cron: "25 12 * * 0-4" # Sunday (0) to Thursday (4)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    env:
      # Preferred: single Supabase connection string (copy Session-mode pooler URL
      # from Supabase dashboard → Project Settings → Database → Connection string)
      # Format: postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Fallback individual params (used only when DATABASE_URL is not set)
      PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
      PGPORT: ${{ secrets.SUPABASE_DB_PORT }}
      PGDATABASE: ${{ secrets.SUPABASE_DB_NAME }}
      PGUSER: ${{ secrets.SUPABASE_DB_USER }}
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Run daily sharesansar API scraper
        run: uv run python scripts/sharesansar_api_daily_scraper.py

      - name: Run daily sharesansar indices scraper
        run: uv run python scripts/sharesansar_indices_daily_scraper.py

      - name: Import today's data to database if files exist
        run: |
          if [ -f sharesansarAPI/$(date +%Y_%m_%d).csv ] || [ -f Indices/$(date +%Y_%m_%d).csv ]; then
            uv run python scripts/import_today_data.py
          fi

      - name: Compute indicators for today if new data was imported
        run: |
          if [ -f sharesansarAPI/$(date +%Y_%m_%d).csv ]; then
            uv run python scripts/compute_indicators_daily.py
          fi

      # - name: Run company list scraper
      #   run: uv run python scripts/scrape_company_listings.py

      - name: Commit and push scraped CSV data if changed
        run: |
          git config --global user.name "0Ankit0"
          git config --global user.email "ankitpaudel.1373@gmail.com"
          DATE=$(date +"%Y-%m-%d")
          git add sharesansarAPI/ Indices/ Company_listings.json || true
          if git diff --cached --quiet; then
            echo "No new indices or sharesansarAPI data to commit."
          else
            git commit -m "updated indices and stock data for date : $DATE"
            git push
          fi
